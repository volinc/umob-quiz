services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: umob
      POSTGRES_PASSWORD: umob
      POSTGRES_DB: umobquiz
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umob -d umobquiz"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=umobquiz;Username=umob;Password=umob
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  db_data:
